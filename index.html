<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>

<body class="default">

    <div class="row">
        <!-- DIV 1 -->
        <div class="row-1">
            <div class="block">
                <div class="page-1">
                    <!-- Start Photo -->
                    <div class="profile">
                        <img src="" alt="Profile">
                    </div>
                    <!-- End Photo -->
                    <!-- Seção de Educação -->
                     <div class="education">
                        <h2 class="title">Educação</h2>
                        <span class="subtitle">UniCEUB</span>
                        <p class="paragraf">Descrição</p>
                     </div>
                     <!-- Fim seção de Educação -->
                     <!-- Seção de Habilidades -->
                     <div class="skills">
                        <h2 class="title">Habilidades</h2>
                        <p class="paragraf">Habilidade 1</p>
                     </div>
                     <!-- Fim seção de Habilidades -->
                     <!-- Seção de Interesses -->
                     <div class="interests">
                        <h2 class="title">Interesses</h2>
                        <p class="paragraf">Interesse 1</p>
                     </div>
                     <!-- Fim seção de Interesses -->
                     
                </div>
            </div>
        </div>
        <!-- DIV 2 -->
        <div class="row-2">
            <div class="block">
                <div class="page-2">
                    <!-- Seção de Nome -->
                    <div class="name">
                        <h1 class="title">Cecília</h1>
                        <h3 class="subtitle">Desenvolvedora Web</h3>
                        <p class="paragraf">Descrição da minha profissão</p>
                    </div>
                    <!-- Fim seção de Nome -->
                     <!-- Seção de Experiências -->
                    <div class="experience">
                        <h2 class="title">Experiências</h2>
                        <div class="item">
                            <span class="subtitle">Experiência 1</span>
                            <p class="paragraf">Descrição</p>
                        </div>
                    </div>
                    <!-- Fim seção de Experiências -->
                    <!-- Seção de Referências -->
                    <div class="reference">
                        <h2 class="title">Referências</h2>
                        <div class="item">
                            <span class="subtitle">Referência 1</span>
                            <p class="paragraf">Descrição</p>
                        </div>
                    </div>
                    <!-- Fim seção de Referências -->
                </div>
            </div>
        </div>
    </div>
    <footer>
        <div class="container">
            <p class="paragraf">Rodapé</p>
        </div>
    </footer>
</body>
</html>
